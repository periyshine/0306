<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成 PWA 图标</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 { color: #4F46E5; }
        .preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .icon-preview {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        canvas {
            image-rendering: pixelated;
            margin: 10px 0;
            border: 1px solid #e5e7eb;
        }
        input {
            display: block;
            margin: 20px 0;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background: #4F46E5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #4338CA; }
        .download-all {
            background: #10B981;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>健身追踪 PWA - 图标生成器</h1>

    <p>上传一个高分辨率的图标图片（建议 512x512 或更大），本工具将生成所需的所有尺寸的图标。</p>

    <input type="file" id="imageInput" accept="image/*">
    <button id="generateBtn">生成图标</button>
    <button id="downloadAllBtn" class="download-all" style="display: none;">下载所有图标</button>

    <div class="preview-container" id="previewContainer"></div>

    <script>
        const sizes = [
            { name: 'favicon-16x16.png', size: 16 },
            { name: 'favicon-32x32.png', size: 32 },
            { name: 'icon-192x192.png', size: 192 },
            { name: 'icon-512x512.png', size: 512 },
            { name: 'apple-touch-icon.png', size: 180 }
        ];

        const generatedIcons = {};

        document.getElementById('generateBtn').addEventListener('click', generateIcons);
        document.getElementById('downloadAllBtn').addEventListener('click', downloadAll);

        function generateIcons() {
            const input = document.getElementById('imageInput');
            if (!input.files || !input.files[0]) {
                alert('请先选择一张图片');
                return;
            }

            const img = new Image();
            img.onload = () => {
                const container = document.getElementById('previewContainer');
                container.innerHTML = '';

                sizes.forEach(({ name, size }) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');

                    // Draw image
                    ctx.drawImage(img, 0, 0, size, size);

                    // Create preview container
                    const div = document.createElement('div');
                    div.className = 'icon-preview';
                    div.innerHTML = `
                        <h3>${name}</h3>
                        <p>${size}x${size}px</p>
                        <canvas id="canvas-${name}" width="${Math.min(size, 96)}" height="${Math.min(size, 96)}"></canvas>
                        <button onclick="downloadIcon('${name}')">下载</button>
                    `;

                    // Show preview
                    const previewCanvas = div.querySelector(`#canvas-${name}`);
                    const previewCtx = previewCanvas.getContext('2d');
                    previewCtx.drawImage(canvas, 0, 0, Math.min(size, 96), Math.min(size, 96));

                    container.appendChild(div);

                    // Store for download
                    generatedIcons[name] = canvas.toDataURL('image/png');
                });

                document.getElementById('downloadAllBtn').style.display = 'block';
            };
            img.src = URL.createObjectURL(input.files[0]);
        }

        function downloadIcon(name) {
            const link = document.createElement('a');
            link.download = name;
            link.href = generatedIcons[name];
            link.click();
        }

        function downloadAll() {
            // Download with a small delay between each
            Object.keys(generatedIcons).forEach((name, index) => {
                setTimeout(() => downloadIcon(name), index * 200);
            });
        }
    </script>
</body>
</html>
