<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <meta name="description" content="健身追踪仪表盘 - 记录您的锻炼、追踪进度、实现目标">
    <title>健身追踪仪表盘</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1><i class="fas fa-heartbeat"></i> 健身追踪仪表盘</h1>
        <button id="installBtn" class="install-btn" style="display: none;">
            <i class="fas fa-download"></i> 安装应用
        </button>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Section Navigation -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="dashboard">
                <i class="fas fa-chart-line"></i> 仪表盘
            </button>
            <button class="tab-btn" data-tab="workouts">
                <i class="fas fa-dumbbell"></i> 锻炼记录
            </button>
            <button class="tab-btn" data-tab="goals">
                <i class="fas fa-bullseye"></i> 目标
            </button>
            <button class="tab-btn" data-tab="steps">
                <i class="fas fa-shoe-prints"></i> 计步器
            </button>
        </nav>

        <!-- Dashboard Section -->
        <section id="dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-fire"></i></div>
                    <div class="stat-info">
                        <p class="stat-label">本周锻炼</p>
                        <p class="stat-value" id="weeklyWorkouts">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <p class="stat-label">总时长</p>
                        <p class="stat-value" id="totalDuration">0 分钟</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-route"></i></div>
                    <div class="stat-info">
                        <p class="stat-label">总距离</p>
                        <p class="stat-value" id="totalDistance">0 公里</p>
                    </div>
                </div>
            </div>

            <div class="charts-section">
                <div class="chart-container">
                    <h3><i class="fas fa-weight"></i> 体重变化</h3>
                    <canvas id="weightChart"></canvas>
                    <div class="chart-controls">
                        <input type="number" id="newWeight" placeholder="输入体重 (kg)" step="0.1" min="20" max="300">
                        <button id="addWeightBtn" class="btn-primary">
                            <i class="fas fa-plus"></i> 记录体重
                        </button>
                    </div>
                </div>

                <div class="chart-container">
                    <h3><i class="fas fa-chart-bar"></i> 每周锻炼量</h3>
                    <canvas id="workoutChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Workouts Section -->
        <section id="workouts" class="tab-content">
            <div class="form-container">
                <h2><i class="fas fa-plus-circle"></i> 添加锻炼记录</h2>
                <form id="workoutForm" class="workout-form">
                    <div class="form-group">
                        <label for="workoutType">锻炼类型</label>
                        <select id="workoutType" required>
                            <option value="">选择类型</option>
                            <option value="running">跑步</option>
                            <option value="cycling">骑行</option>
                            <option value="weightlifting">举重</option>
                            <option value="swimming">游泳</option>
                            <option value="yoga">瑜伽</option>
                            <option value="other">其他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="workoutDate">日期</label>
                        <input type="date" id="workoutDate" required>
                    </div>

                    <div class="form-group">
                        <label for="duration">时长（分钟）</label>
                        <input type="number" id="duration" min="1" max="1440" required placeholder="输入时长">
                    </div>

                    <div class="form-group" id="distanceGroup">
                        <label for="distance">距离（公里）</label>
                        <input type="number" id="distance" min="0" max="1000" step="0.01" placeholder="输入距离">
                    </div>

                    <div class="form-group" id="weightGroup">
                        <label for="workoutWeight">重量（公斤）</label>
                        <input type="number" id="workoutWeight" min="0" max="1000" step="0.5" placeholder="输入重量">
                    </div>

                    <div class="form-group">
                        <label for="notes">备注</label>
                        <textarea id="notes" rows="3" placeholder="添加备注..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary btn-large">
                        <i class="fas fa-save"></i> 保存锻炼记录
                    </button>
                </form>
            </div>

            <div class="workouts-list">
                <h2><i class="fas fa-history"></i> 锻炼历史</h2>
                <div id="workoutList" class="workout-cards"></div>
            </div>
        </section>

        <!-- Goals Section -->
        <section id="goals" class="tab-content">
            <div class="goals-section">
                <div class="add-goal-form">
                    <h2><i class="fas fa-flag"></i> 设定新目标</h2>
                    <form id="goalForm">
                        <div class="form-group">
                            <label for="goalType">目标类型</label>
                            <select id="goalType" required>
                                <option value="">选择目标类型</option>
                                <option value="workouts">锻炼次数</option>
                                <option value="duration">总时长（分钟）</option>
                                <option value="distance">总距离（公里）</option>
                                <option value="weight">目标体重（公斤）</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="goalTarget">目标值</label>
                            <input type="number" id="goalTarget" min="1" required placeholder="输入目标值">
                        </div>

                        <div class="form-group">
                            <label for="goalPeriod">时间周期</label>
                            <select id="goalPeriod" required>
                                <option value="daily">每日</option>
                                <option value="weekly" selected>每周</option>
                                <option value="monthly">每月</option>
                            </select>
                        </div>

                        <button type="submit" class="btn-primary">
                            <i class="fas fa-plus"></i> 添加目标
                        </button>
                    </form>
                </div>

                <div class="goals-list">
                    <h2><i class="fas fa-trophy"></i> 我的目标</h2>
                    <div id="goalsContainer" class="goals-container"></div>
                </div>

                <div class="milestones">
                    <h2><i class="fas fa-medal"></i> 里程碑</h2>
                    <div id="milestonesList" class="milestones-grid"></div>
                </div>
            </div>
        </section>

        <!-- Steps Section -->
        <section id="steps" class="tab-content">
            <div class="steps-tracker">
                <div class="steps-display">
                    <i class="fas fa-shoe-prints"></i>
                    <h2>今日步数</h2>
                    <div class="steps-count" id="stepsCount">--</div>
                    <div class="steps-distance" id="stepsDistance">-- 公里</div>
                </div>

                <div class="steps-info">
                    <p id="pedometerStatus">检测计步器...</p>
                    <button id="startTrackingBtn" class="btn-primary" style="display: none;">
                        <i class="fas fa-play"></i> 开始追踪步数
                    </button>
                    <button id="stopTrackingBtn" class="btn-danger" style="display: none;">
                        <i class="fas fa-stop"></i> 停止追踪
                    </button>
                </div>

                <div class="steps-history">
                    <h3>步数历史</h3>
                    <canvas id="stepsChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <!-- Floating Share Button -->
    <button id="shareBtn" class="floating-share-btn" title="分享锻炼">
        <i class="fas fa-share-alt"></i>
    </button>

    <!-- Share Preview Modal -->
    <div id="shareModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-share-alt"></i> 分享您的锻炼</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <div id="sharePreview"></div>
                <div class="share-actions">
                    <button id="downloadImageBtn" class="btn-primary">
                        <i class="fas fa-download"></i> 下载图片
                    </button>
                    <button id="shareNativeBtn" class="btn-secondary">
                        <i class="fas fa-share"></i> 分享
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="db.js"></script>
    <script src="share.js"></script>
    <script src="app.js"></script>
</body>
</html>
