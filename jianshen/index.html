<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="功能完整的健身追踪渐进式网络应用，记录锻炼、追踪进展、设定目标">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="健身追踪">
    <meta name="mobile-web-app-capable" content="yes">

    <title>健身追踪仪表盘</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png>
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png">

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-content">
            <div class="header-left">
                <svg class="app-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4.8 2.3A.3.3 0 0 0 5 2h14a.3.3 0 0 0 .2.3l-3.6 12a.3.3 0 0 1-.2.2h-6.8a.3.3 0 0 1-.2-.2L4.8 2.3z"/>
                    <path d="M12 14v8"/>
                    <path d="M8 18h8"/>
                    <circle cx="8" cy="22" r="1.5"/>
                    <circle cx="16" cy="22" r="1.5"/>
                </svg>
                <h1>健身追踪</h1>
            </div>
            <div class="header-actions">
                <button id="themeToggle" class="icon-btn" aria-label="切换主题" title="切换主题">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <button id="pedometerToggle" class="icon-btn" aria-label="计步器" title="计步器">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="6" y="2" width="12" height="20" rx="2"/>
                        <line x1="12" y1="18" x2="12" y2="18.01"/>
                        <path d="M10 10h4"/>
                    </svg>
                    <span id="stepCount" class="step-badge">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Navigation -->
    <nav class="main-nav">
        <button class="nav-btn active" data-tab="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
            </svg>
            <span>仪表盘</span>
        </button>
        <button class="nav-btn" data-tab="workouts">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            <span>锻炼</span>
        </button>
        <button class="nav-btn" data-tab="add">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="16"/>
                <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            <span>添加</span>
        </button>
        <button class="nav-btn" data-tab="goals">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
            </svg>
            <span>目标</span>
        </button>
        <button class="nav-btn" data-tab="weight">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 3v18"/>
                <path d="m8 17 4 4 4-4"/>
                <circle cx="12" cy="5" r="1"/>
            </svg>
            <span>体重</span>
        </button>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Dashboard Tab -->
        <section id="dashboard" class="tab-content active">
            <div class="dashboard-grid">
                <!-- Stats Cards -->
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-icon workout">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                            </svg>
                        </div>
                        <div class="stat-content">
                            <span class="stat-value" id="totalWorkouts">0</span>
                            <span class="stat-label">总锻炼次数</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon duration">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                        </div>
                        <div class="stat-content">
                            <span class="stat-value" id="totalDuration">0</span>
                            <span class="stat-label">总时长（分钟）</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon calories">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
                            </svg>
                        </div>
                        <div class="stat-content">
                            <span class="stat-value" id="totalCalories">0</span>
                            <span class="stat-label">消耗卡路里</span>
                        </div>
                    </div>
                </div>

                <!-- Charts -->
                <div class="chart-section">
                    <h2>本周锻炼统计</h2>
                    <div class="chart-container">
                        <canvas id="weeklyChart"></canvas>
                    </div>
                </div>

                <div class="chart-section">
                    <h2>锻炼类型分布</h2>
                    <div class="chart-container small">
                        <canvas id="typeChart"></canvas>
                    </div>
                </div>

                <!-- Recent Workouts -->
                <div class="recent-section">
                    <h2>最近锻炼</h2>
                    <div id="recentWorkouts" class="workout-list">
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="12"/>
                                <line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                            <p>还没有锻炼记录</p>
                            <p class="hint">点击下方"添加"按钮开始记录</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Workouts Tab -->
        <section id="workouts" class="tab-content">
            <div class="section-header">
                <h2>锻炼记录</h2>
                <div class="filter-controls">
                    <select id="filterType" class="filter-select">
                        <option value="">全部类型</option>
                        <option value="running">跑步</option>
                        <option value="cycling">骑行</option>
                        <option value="weightlifting">举重</option>
                        <option value="swimming">游泳</option>
                        <option value="yoga">瑜伽</option>
                        <option value="other">其他</option>
                    </select>
                    <input type="date" id="filterDate" class="filter-input">
                </div>
            </div>
            <div id="allWorkouts" class="workout-list">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <p>还没有锻炼记录</p>
                    <p class="hint">点击下方"添加"按钮开始记录</p>
                </div>
            </div>
        </section>

        <!-- Add Workout Tab -->
        <section id="add" class="tab-content">
            <h2>添加锻炼记录</h2>
            <form id="workoutForm" class="workout-form">
                <div class="form-group">
                    <label for="workoutType">锻炼类型</label>
                    <select id="workoutType" name="type" required>
                        <option value="">请选择</option>
                        <option value="running">跑步</option>
                        <option value="cycling">骑行</option>
                        <option value="weightlifting">举重</option>
                        <option value="swimming">游泳</option>
                        <option value="yoga">瑜伽</option>
                        <option value="other">其他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="workoutDate">日期</label>
                    <input type="date" id="workoutDate" name="date" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="workoutDuration">时长（分钟）</label>
                        <input type="number" id="workoutDuration" name="duration" min="1" max="1440" required>
                    </div>
                    <div class="form-group">
                        <label for="workoutCalories">消耗卡路里</label>
                        <input type="number" id="workoutCalories" name="calories" min="0" placeholder="可选">
                    </div>
                </div>

                <!-- Dynamic fields based on type -->
                <div id="dynamicFields" class="dynamic-fields"></div>

                <div class="form-group">
                    <label for="workoutNotes">备注</label>
                    <textarea id="workoutNotes" name="notes" rows="3" placeholder="记录你的感受..."></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    保存记录
                </button>
            </form>
        </section>

        <!-- Goals Tab -->
        <section id="goals" class="tab-content">
            <div class="section-header">
                <h2>健身目标</h2>
                <button id="addGoalBtn" class="secondary-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    添加目标
                </button>
            </div>
            <div id="goalsList" class="goals-list">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    <p>还没有设定目标</p>
                    <p class="hint">点击"添加目标"开始设定你的健身目标</p>
                </div>
            </div>
        </section>

        <!-- Weight Tab -->
        <section id="weight" class="tab-content">
            <div class="section-header">
                <h2>体重追踪</h2>
                <button id="addWeightBtn" class="secondary-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    记录体重
                </button>
            </div>
            <div class="chart-section full">
                <h2>体重变化趋势</h2>
                <div class="chart-container">
                    <canvas id="weightChart"></canvas>
                </div>
            </div>
            <div id="weightHistory" class="weight-history">
                <h3>历史记录</h3>
                <div class="weight-list"></div>
            </div>
        </section>
    </main>

    <!-- Modals -->
    <!-- Edit Workout Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑锻炼记录</h3>
                <button class="close-btn" data-close="editModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="editForm" class="workout-form"></form>
        </div>
    </div>

    <!-- Goal Modal -->
    <div id="goalModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="goalModalTitle">添加目标</h3>
                <button class="close-btn" data-close="goalModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="goalForm" class="goal-form">
                <div class="form-group">
                    <label for="goalType">目标类型</label>
                    <select id="goalType" name="type" required>
                        <option value="">请选择</option>
                        <option value="workout_count">锻炼次数</option>
                        <option value="duration">总时长（分钟）</option>
                        <option value="calories">消耗卡路里</option>
                        <option value="distance">总距离（公里）</option>
                        <option value="weight_loss">减重（公斤）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="goalTarget">目标值</label>
                    <input type="number" id="goalTarget" name="target" min="1" required>
                </div>
                <div class="form-group">
                    <label for="goalPeriod">时间周期</label>
                    <select id="goalPeriod" name="period" required>
                        <option value="weekly">每周</option>
                        <option value="monthly">每月</option>
                        <option value="custom">自定义</option>
                    </select>
                </div>
                <div class="form-group" id="customDatesGroup" style="display: none;">
                    <label for="goalStartDate">开始日期</label>
                    <input type="date" id="goalStartDate" name="startDate">
                    <label for="goalEndDate" style="margin-top: 10px;">结束日期</label>
                    <input type="date" id="goalEndDate" name="endDate">
                </div>
                <button type="submit" class="submit-btn">保存目标</button>
            </form>
        </div>
    </div>

    <!-- Weight Modal -->
    <div id="weightModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>记录体重</h3>
                <button class="close-btn" data-close="weightModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="weightForm" class="weight-form">
                <div class="form-group">
                    <label for="weightValue">体重（公斤）</label>
                    <input type="number" id="weightValue" name="weight" step="0.1" min="20" max="300" required>
                </div>
                <div class="form-group">
                    <label for="weightDate">日期</label>
                    <input type="date" id="weightDate" name="date" required>
                </div>
                <div class="form-group">
                    <label for="weightNotes">备注</label>
                    <textarea id="weightNotes" name="notes" rows="2" placeholder="可选..."></textarea>
                </div>
                <button type="submit" class="submit-btn">保存</button>
            </form>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="shareModal" class="modal">
        <div class="modal-content share-modal">
            <div class="modal-header">
                <h3>分享锻炼</h3>
                <button class="close-btn" data-close="shareModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div id="shareCard" class="share-card">
                <div class="share-card-header">
                    <div class="share-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                        </svg>
                    </div>
                    <div class="share-app-name">健身追踪</div>
                </div>
                <div class="share-workout-info" id="shareWorkoutInfo"></div>
                <div class="share-footer">
                    <span id="shareDateString"></span>
                    <span class="share-motto">坚持就是胜利</span>
                </div>
            </div>
            <div class="share-actions">
                <button id="shareDownload" class="secondary-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    下载图片
                </button>
                <button id="shareNative" class="submit-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="5" r="3"/>
                        <circle cx="6" cy="12" r="3"/>
                        <circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                    分享
                </button>
            </div>
        </div>
    </div>

    <!-- Pedometer Panel -->
    <div id="pedometerPanel" class="pedometer-panel">
        <div class="pedometer-header">
            <h3>计步器</h3>
            <button id="closePedometer" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="pedometer-content">
            <div class="pedometer-status" id="pedometerStatus">
                <p class="status-text">检测中...</p>
            </div>
            <div class="pedometer-stats">
                <div class="pedo-stat">
                    <span class="pedo-value" id="pedoSteps">-</span>
                    <span class="pedo-label">今日步数</span>
                </div>
                <div class="pedo-stat">
                    <span class="pedo-value" id="pedoDistance">-</span>
                    <span class="pedo-label">距离（米）</span>
                </div>
                <div class="pedo-stat">
                    <span class="pedo-value" id="pedoCalories">-</span>
                    <span class="pedo-label">消耗卡路里</span>
                </div>
            </div>
            <button id="syncStepsToWorkout" class="submit-btn full-width">
                同步到锻炼记录
            </button>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- PWA Install Prompt -->
    <div id="installPrompt" class="install-prompt" style="display: none;">
        <div class="prompt-content">
            <div class="prompt-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 16l4.586-4.586a2 2 0 0 1 2.828 0L16 16m-2-2l1.586-1.586a2 2 0 0 1 2.828 0L20 14m-6-6h.01M6 20h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"/>
                </svg>
            </div>
            <div class="prompt-text">
                <strong>安装健身追踪</strong>
                <p>添加到主屏幕获取最佳体验</p>
            </div>
            <div class="prompt-actions">
                <button id="installDismiss" class="text-btn">稍后</button>
                <button id="installConfirm" class="primary-btn">安装</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./scripts/storage.js"></script>
    <script src="./scripts/app.js"></script>
    <script src="./scripts/charts.js"></script>
    <script src="./scripts/goals.js"></script>
    <script src="./scripts/share.js"></script>
    <script src="./scripts/pedometer.js"></script>
</body>
</html>
