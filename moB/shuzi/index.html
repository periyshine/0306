<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本字数统计工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>文本字数统计工具</h1>

        <div class="textarea-container">
            <textarea id="textInput" placeholder="请输入或粘贴您要统计的文本..."></textarea>
        </div>

        <div class="controls">
            <button id="clearBtn" class="btn btn-secondary">清空</button>
            <button id="copyBtn" class="btn btn-primary">复制文本</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">总字数</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">中文字数</div>
                <div class="stat-value" id="chineseCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">英文单词</div>
                <div class="stat-value" id="englishCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">段落数</div>
                <div class="stat-value" id="paragraphCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">行数</div>
                <div class="stat-value" id="lineCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">字符数（含空格）</div>
                <div class="stat-value" id="charWithSpaceCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">字符数（不含空格）</div>
                <div class="stat-value" id="charWithoutSpaceCount">0</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
